<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen Económico Automático</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #edeff2; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        h1 { text-align: center; font-size: 1.4rem; color: #1a1a1a; margin-bottom: 20px; }
        .tarjeta { 
            background: white; border-radius: 12px; padding: 15px; 
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 5px solid #007bff;
        }
        .fuente-infobae { border-left-color: #ff8000; }
        .fuente-ambito { border-left-color: #003366; }
        .fuente-cronista { border-left-color: #e30613; }
        .fuente-tag { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #777; margin-bottom: 5px; display: block; }
        .titulo { font-size: 1.1rem; font-weight: bold; color: #1a1a1a; text-decoration: none; display: block; margin-bottom: 8px; line-height: 1.3; }
        .resumen { font-size: 0.95rem; color: #444; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        #loader { text-align: center; padding: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Economía en Tiempo Real</h1>
    <div id="loader">Cargando noticias de hoy...</div>
    <div id="pizarra"></div>
</div>

<script>
    const MEDIOS = [
        { nombre: 'Infobae', url: 'https://www.infobae.com/feeds/rss/economia', clase: 'fuente-infobae' },
        { nombre: 'Ámbito', url: 'https://www.ambito.com/rss/mercados.xml', clase: 'fuente-ambito' },
        { nombre: 'Cronista', url: 'https://www.cronista.com/files/rss/finanzas.xml', clase: 'fuente-cronista' }
    ];

    async function cargarNoticias() {
        const pizarra = document.getElementById('pizarra');
        const loader = document.getElementById('loader');
        
        // Proxy alternativo que maneja mejor el CORS en Vercel
        const proxyUrl = "https://api.allorigins.win/get?url=";

        for (const medio of MEDIOS) {
            try {
                // Hacemos la petición a través del proxy
                const response = await fetch(`${proxyUrl}${encodeURIComponent(medio.url)}`);
                if (!response.ok) throw new Error('Error en red');
                
                const data = await response.json();
                const parser = new DOMParser();
                // Allorigins devuelve el contenido en data.contents
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length === 0) continue;

                Array.from(items).slice(0, 3).forEach(item => {
                    const titulo = item.querySelector("title")?.textContent || "Sin título";
                    const link = item.querySelector("link")?.textContent || "#";
                    let desc = item.querySelector("description")?.textContent || "Sin resumen disponible.";
                    
                    // Limpieza profunda de etiquetas HTML y acortado
                    desc = desc.replace(/<[^>]*>/g, '').substring(0, 180);

                    const tarjeta = document.createElement('div');
                    tarjeta.className = `tarjeta ${medio.clase}`;
                    tarjeta.innerHTML = `
                        <span class="fuente-tag">${medio.nombre}</span>
                        <a href="${link}" target="_blank" class="titulo">${titulo}</a>
                        <div class="resumen">${desc}...</div>
                    `;
                    pizarra.appendChild(tarjeta);
                });
            } catch (e) {
                console.warn("No se pudo cargar " + medio.nombre);
            }
        }
        loader.style.display = 'none';
    }

    // Ejecutar al cargar la página
    window.addEventListener('load', cargarNoticias);
</script>

</body>
</html>
