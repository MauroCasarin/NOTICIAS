<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Inteligencia en Tiempo Real</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --text: #0f172a; --border: #e2e8f0; --ai-bg: #f8fafc; --green: #10b981; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 10px; color: var(--text); }
        .container { max-width: 1200px; margin: auto; }

        .ai-panel { 
            background: var(--ai-bg); border: 1px solid var(--blue); border-radius: 12px; 
            padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
            position: relative;
        }
        .ai-status { font-size: 0.7rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 10px; display: block; }
        #ai-resumen { font-size: 0.95rem; line-height: 1.6; color: #334155; min-height: 60px; }
        
        .btn-analizar {
            background: var(--blue); color: white; border: none; padding: 8px 15px; 
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold;
            display: flex; align-items: center; gap: 5px; margin-top: 15px;
        }
        .btn-analizar:disabled { background: #cbd5e1; cursor: not-allowed; }

        .header { background: #ffffff; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--blue); }
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .diario-card { background: #ffffff; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .diario-header { font-size: 0.9rem; font-weight: 800; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }
        .noticia-row { padding: 7px 0; border-bottom: 1px solid #f1f5f9; }
        .title { font-size: 0.85rem; font-weight: 600; color: #334155; text-decoration: none; display: block; }
        
        #alerta-viva { color: var(--green); font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .pulse-green { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse-g 1.5s infinite; }
        @keyframes pulse-g { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <section class="ai-panel">
        <span class="ai-status" id="ia-estado">Iniciando sistema...</span>
        <div id="ai-resumen">Cargando portales para iniciar análisis estratégico...</div>
        <button id="btn-re-analizar" class="btn-analizar" onclick="forzarAnalisis()" disabled>
            <i data-lucide="refresh-cw" style="width:14px"></i> ANALIZAR NUEVAMENTE
        </button>
    </section>

    <header class="header">
        <div style="display:flex; align-items:center; gap:10px">
            <img src="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico" style="width:20px">
            <span style="font-weight: 800; color: var(--blue); font-size: 0.9rem;">CENTINELA</span>
        </div>
        <div id="alerta-viva"><div class="pulse-green"></div> VIVO</div>
        <span id="contador" style="font-size: 0.7rem; font-weight: bold; color: #64748b;">...</span>
    </header>

    <main id="pizarra" class="grid-noticias"></main>
</div>

<script>
    const NEWS_API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";
    let ultimaData = [];
    let isTyping = false;

    async function monitorear() {
        try {
            const res = await fetch(NEWS_API);
            const data = await res.json();
            const news = data.noticias || [];

            // Comparar si hay noticias nuevas para renderizar
            if (JSON.stringify(news) !== JSON.stringify(ultimaData)) {
                ultimaData = news;
                document.getElementById('contador').innerText = `${news.length} NOTICIAS`;
                render(news);
                if (!isTyping) forzarAnalisis(); 
            }
        } catch (e) { console.error("Error de red"); }
    }

    async function forzarAnalisis() {
        if (ultimaData.length === 0 || isTyping) return;
        
        const resumenDiv = document.getElementById('ai-resumen');
        const estadoIA = document.getElementById('ia-estado');
        const btn = document.getElementById('btn-re-analizar');

        btn.disabled = true;
        estadoIA.innerText = "Fase 1: Identificando repeticiones y cotizaciones...";
        resumenDiv.innerText = "Escaneando titulares...";

        try {
            const titulos = ultimaData.slice(0, 50).map(n => n.titulo).join(" | ");
            const resp = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulos })
            });
            const result = await resp.json();
            
            estadoIA.innerText = "Análisis Estratégico Finalizado";
            typeWriter(result.resumen, "ai-resumen");
        } catch (err) {
            estadoIA.innerText = "Error en NoticiasAPI";
            btn.disabled = false;
        }
    }

    function typeWriter(text, elementId) {
        isTyping = true;
        let i = 0;
        const speed = 20; // Velocidad en ms
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                isTyping = false;
                document.getElementById('btn-re-analizar').disabled = false;
            }
        }
        type();
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const grouped = news.reduce((acc, n) => {
            acc[n.fuente] = acc[n.fuente] || [];
            acc[n.fuente].push(n);
            return acc;
        }, {});

        for (const f in grouped) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            const rows = grouped[f].map(n => `<div class="noticia-row"><a href="${n.link}" target="_blank" class="title">${n.titulo}</a></div>`).join('');
            card.innerHTML = `<div class="diario-header">${f}</div><div>${rows}</div>`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    // Monitoreo constante cada 30 segundos para noticias nuevas
    monitorear();
    setInterval(monitorear, 30000); 
</script>
</body>
</html>
