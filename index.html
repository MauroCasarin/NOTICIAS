<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Inteligencia Estratégica</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --text: #0f172a; --border: #e2e8f0; --ai-bg: #f8fafc; --green: #10b981; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #ffffff; margin: 0; padding: 10px; color: var(--text); }
        .container { max-width: 1200px; margin: auto; }

        /* Panel Superior IA */
        .ai-panel { 
            background: var(--ai-bg); border: 1px solid var(--blue); border-radius: 12px; 
            padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }
        .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .ai-title { font-size: 0.75rem; font-weight: 800; color: var(--blue); text-transform: uppercase; }
        #ai-resumen { font-size: 0.95rem; line-height: 1.5; color: #334155; font-weight: 600; }

        .header { 
            background: #ffffff; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--blue);
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .favicon-img { width: 20px; height: 20px; }
        
        #alerta-nuevas { background: var(--green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; display: none; }

        /* Grid de Noticias */
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .diario-card { background: #ffffff; border-radius: 12px; padding: 15px; border: 1px solid var(--border); transition: transform 0.2s; }
        .diario-card:hover { transform: translateY(-2px); border-color: var(--blue); }
        .diario-header { font-size: 1rem; font-weight: 800; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }

        .noticia-row { padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .noticia-row:last-child { border-bottom: none; }
        .title { font-size: 0.88rem; font-weight: 600; color: #334155; text-decoration: none; display: block; line-height: 1.4; }
        .title:hover { color: var(--blue); }
        
        #loader-main { text-align: center; padding: 50px; color: var(--blue); font-weight: bold; }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-panel">
        <div class="ai-header">
            <i data-lucide="brain-circuit" style="color: var(--blue); width: 16px;"></i>
            <span class="ai-title">Tendencia del Momento (Llama 3.3)</span>
        </div>
        <div id="ai-resumen" class="animate-pulse">Sincronizando con NoticiasAPI de Groq...</div>
    </div>

    <header class="header">
        <div class="brand">
            <img src="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico" class="favicon-img" alt="logo">
            <span style="font-weight: 800; color: var(--blue); font-size: 0.9rem;">CENTINELA</span>
        </div>
        <div id="alerta-nuevas"></div>
        <span id="contador" style="font-size: 0.7rem; font-weight: bold; color: #64748b;">Conectando...</span>
    </header>

    <div id="loader-main">
        <div class="spin"><i data-lucide="refresh-cw" size="32"></i></div>
        <p>Actualizando portales...</p>
    </div>

    <main id="pizarra" class="grid-noticias"></main>
</div>

<script>
    // CREDENCIALES
    const GROQ_KEY = "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";
    const NEWS_API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";

    let cacheNoticias = [];

    async function monitorear() {
        try {
            const response = await fetch(NEWS_API);
            const data = await response.json();
            const news = data.noticias || [];

            if (cacheNoticias.length > 0) {
                const viejas = new Set(cacheNoticias.map(n => n.link));
                const nuevas = news.filter(n => !viejas.has(n.link));
                if (nuevas.length > 0) {
                    mostrarNotificacion(`+${nuevas.length} NOTICIAS`);
                    render(news);
                    ejecutarIA(news);
                }
            } else {
                render(news);
                ejecutarIA(news);
            }

            cacheNoticias = news;
            document.getElementById('contador').innerText = `${news.length} NOTICIAS TOTALES`;
            document.getElementById('loader-main').style.display = 'none';
        } catch (e) {
            document.getElementById('contador').innerText = "ERROR DE SINCRONIZACIÓN";
        }
    }

    async function ejecutarIA(news) {
        const resumenDiv = document.getElementById('ai-resumen');
        // Usamos los primeros 40 titulares para no saturar la API
        const titulos = news.slice(0, 40).map(n => n.titulo).join(" | ");

        try {
            const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user",
                        content: `Analiza estos titulares y dime en una sola frase corta (máximo 15 palabras) cuál es la noticia más importante o tendencia que más se repite: ${titulos}`
                    }]
                })
            });
            
            const result = await resp.json();
            resumenDiv.classList.remove('animate-pulse');
            resumenDiv.innerHTML = `<i data-lucide="trending-up" style="width:14px; color:var(--green); display:inline; margin-right:5px"></i> ${result.choices[0].message.content}`;
            lucide.createIcons();
        } catch (err) {
            resumenDiv.innerText = "Esperando actualización de tendencias...";
        }
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const agrupadas = news.reduce((acc, n) => {
            const f = n.fuente || "Otros";
            if (!acc[f]) acc[f] = [];
            acc[f].push(n);
            return acc;
        }, {});

        for (const diario in agrupadas) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            const htmlNoticias = agrupadas[diario].map(n => `
                <div class="noticia-row">
                    <a href="${n.link}" target="_blank" class="title">${n.titulo}</a>
                </div>
            `).join('');
            card.innerHTML = `<div class="diario-header">${diario}</div><div>${htmlNoticias}</div>`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    function mostrarNotificacion(txt) {
        const alerta = document.getElementById('alerta-nuevas');
        alerta.innerText = txt;
        alerta.style.display = 'block';
        setTimeout(() => alerta.style.display = 'none', 8000);
    }

    monitorear();
    setInterval(monitorear, 60000); // Actualiza cada 1 minuto
</script>
</body>
</html>
