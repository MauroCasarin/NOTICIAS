<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Estrategias IA</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --blue-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --dark-blue: #002d72;
            --bg-light: #f1f5f9;
            --text-main: #ffffff;
            --card-bg: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg-light); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .hero-header {
            background: var(--blue-gradient);
            padding: 30px 20px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .brand-title { font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .brand-subtitle { font-size: 0.75rem; opacity: 0.8; font-weight: 600; margin-bottom: 20px; display: block; }

        .ai-container { max-width: 800px; margin: 0 auto; }

        /* Estilo del área de texto con animación de pulso para la carga */
        #ai-resumen { 
            font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.95);
            max-height: 25vh; min-height: 80px; overflow-y: auto; padding: 15px;
            margin-bottom: 20px; font-weight: 500; border-left: 3px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.1); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .loading-text {
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .btn-main {
            background: white; color: #1e40af; border: none;
            padding: 14px 30px; border-radius: 12px; font-weight: 800;
            font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex;
            align-items: center; gap: 10px; margin: 0 auto;
        }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }

        .metrics-bar {
            padding: 12px 20px; background: white; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: center; align-items: center;
        }
        .metric-label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-right: 8px; }
        .metric-value { font-size: 0.9rem; font-weight: 900; color: #1e40af; }

        .scroll-content { flex: 1; overflow-y: auto; padding: 20px; }
        .grid-noticias { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: auto; 
        }
        
        .diario-card { 
            background: white; border-radius: 12px; padding: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
        }
        .diario-header { 
            font-size: 0.75rem; font-weight: 900; color: #1e40af; 
            margin-bottom: 12px; border-left: 3px solid #1e40af; padding-left: 8px; text-transform: uppercase;
        }
        .title { 
            font-size: 0.85rem; font-weight: 600; color: #334155; 
            text-decoration: none; display: block; padding: 8px 0; 
            border-bottom: 1px solid #f1f5f9; line-height: 1.4;
        }
    </style>
</head>
<body>

    <header class="hero-header">
        <div class="ai-container">
            <span class="brand-title">ANÁLISIS IA DE NOTICIAS</span>
            <span class="brand-subtitle">VEREDICTO FINANCIERO EN TIEMPO REAL</span>

            <div id="ai-resumen">
                <div class="loading-text">
                    <i data-lucide="loader-2" class="animate-spin"></i>
                    <span>SINCROIZANDO NOTICIAS...</span>
                </div>
            </div>
            
            <button id="btn-master" class="btn-main" onclick="iniciarProceso()" disabled>
                <i data-lucide="brain-circuit" size="18"></i>
                <span id="btn-label">ESPERANDO DATOS</span>
            </button>
        </div>
    </header>

    <section class="metrics-bar">
        <span class="metric-label">NOTICIAS DETECTADAS:</span>
        <span id="contador" class="metric-value">0</span>
    </section>

    <main class="scroll-content">
        <div id="pizarra" class="grid-noticias"></div>
    </main>

<script>
    const NEWS_API = "https://script.google.com/macros/s/AKfycbxnl6mjB1Zd_eW0LxlYPylMn4gdP4_JgWBfSsB-BMI4czcA65W8gekaxVXlWAi6LNagbQ/exec"; 
    let ultimaData = [];
    let isTyping = false;

    async function monitorear() {
        try {
            const res = await fetch(NEWS_API);
            const data = await res.json();
            const news = data.noticias || [];
            
            if (JSON.stringify(news) !== JSON.stringify(ultimaData)) {
                ultimaData = news;
                document.getElementById('contador').innerText = `${news.length} ACTIVAS`;
                render(news);
                
                // Si es la primera vez que carga y no estamos escribiendo, habilitar botón
                if (!isTyping) {
                    const aiDiv = document.getElementById('ai-resumen');
                    if(aiDiv.querySelector('.loading-text')) {
                        aiDiv.innerHTML = "NOTICIAS CARGADAS. LISTO PARA ANALIZAR.";
                    }
                    document.getElementById('btn-master').disabled = false;
                    document.getElementById('btn-label').innerText = "GENERAR ANÁLISIS";
                }
            }
        } catch (e) { 
            document.getElementById('contador').innerText = "ERROR";
            document.getElementById('ai-resumen').innerText = "Error al conectar con la base de noticias.";
        }
    }

    async function iniciarProceso() {
        if (ultimaData.length === 0 || isTyping) return;
        
        const btn = document.getElementById('btn-master');
        const label = document.getElementById('btn-label');
        const aiDiv = document.getElementById('ai-resumen');
        
        btn.disabled = true;
        isTyping = true;

        label.innerText = "PROCESANDO...";
        aiDiv.innerHTML = `<div class="loading-text"><i data-lucide="cpu" class="animate-spin"></i><span>GENERANDO ANÁLISIS IA...</span></div>`;
        lucide.createIcons();

        try {
            // Enviamos un máximo de 60 titulares para evitar errores de saturación (Status 500)
            const titulos = ultimaData.slice(0, 60).map(n => n.titulo).join(" | ");
            const resp = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulos, modo: 'extenso' })
            });
            
            if (!resp.ok) throw new Error('Error en servidor');
            
            const result = await resp.json();
            label.innerText = "ANÁLISIS COMPLETADO";
            typeWriter(result.resumen || "No se detectaron tendencias claras.", "ai-resumen");
        } catch (err) {
            aiDiv.innerText = "Error al conectar con el motor de IA. Revisa las API Keys en Vercel.";
            resetBtn();
        }
    }

    function resetBtn() {
        const btn = document.getElementById('btn-master');
        const label = document.getElementById('btn-label');
        btn.disabled = false;
        isTyping = false;
        label.innerText = "REGENERAR ANÁLISIS";
    }

    function typeWriter(text, elementId) {
        let i = 0;
        const el = document.getElementById(elementId);
        el.style.justifyContent = "flex-start"; // Alinear texto a la izquierda para el resultado
        el.innerHTML = "";
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                el.scrollTop = el.scrollHeight;
                i++;
                setTimeout(type, 15);
            } else {
                resetBtn();
            }
        }
        type();
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const grouped = news.reduce((acc, n) => {
            acc[n.fuente] = acc[n.fuente] || [];
            acc[n.fuente].push(n);
            return acc;
        }, {});
        for (const f in grouped) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            card.setAttribute('data-fuente', f);
            const rows = grouped[f].map(n => `<a href="${n.link}" target="_blank" class="title">${n.titulo}</a>`).join('');
            card.innerHTML = `<div class="diario-header">${f}</div>${rows}`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    monitorear();
    setInterval(monitorear, 60000); // Sincroniza cada 1 minuto
</script>
</body>
</html>
