<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Inteligencia Estratégica</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --text: #0f172a; --border: #e2e8f0; --ai-bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 10px; color: var(--text); }
        .container { max-width: 1200px; margin: auto; }

        /* Panel Superior IA */
        .ai-panel { 
            background: var(--ai-bg); border: 1px solid var(--blue); border-radius: 12px; 
            padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
        }
        .ai-status { font-size: 0.7rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 10px; display: block; }
        #ai-resumen { font-size: 1rem; line-height: 1.6; color: #334155; }
        .paso-ia { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #64748b; margin-top: 5px; }

        .header { background: #ffffff; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--blue); }
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .diario-card { background: #ffffff; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .diario-header { font-size: 1rem; font-weight: 800; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }
        .noticia-row { padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .title { font-size: 0.88rem; font-weight: 600; color: #334155; text-decoration: none; display: block; }

        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80% { content: ''; } }
    </style>
</head>
<body>

<div class="container">
    <section class="ai-panel">
        <span class="ai-status" id="ia-estado">Esperando carga de noticias...</span>
        <div id="ai-resumen">Las noticias se están sincronizando para iniciar el análisis.</div>
        <div id="ia-pasos" class="paso-ia"></div>
    </section>

    <header class="header">
        <div style="display:flex; align-items:center; gap:10px">
            <img src="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico" style="width:20px">
            <span style="font-weight: 800; color: var(--blue); font-size: 0.95rem;">CENTINELA</span>
        </div>
        <span id="contador" style="font-size: 0.7rem; font-weight: bold; color: #64748b;">Iniciando...</span>
    </header>

    <main id="pizarra" class="grid-noticias"></main>
</div>

<script>
    const NEWS_API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";

    async function iniciar() {
        const resumenDiv = document.getElementById('ai-resumen');
        const estadoIA = document.getElementById('ia-estado');
        
        try {
            // PASO 1: Cargar Noticias
            const res = await fetch(NEWS_API);
            const data = await res.json();
            const news = data.noticias || [];
            
            document.getElementById('contador').innerText = `${news.length} NOTICIAS CARGADAS`;
            render(news);

            // PASO 2: Iniciar Fase de Análisis (después de cargar visualmente)
            estadoIA.innerText = "Fase 1: Analizando patrones de repetición";
            resumenDiv.innerHTML = '<span class="loading-dots">Procesando todos los titulares para identificar tendencias</span>';
            
            await ejecutarIA(news);

        } catch (e) {
            estadoIA.innerText = "Error de conexión";
            resumenDiv.innerText = "No se pudieron cargar las noticias.";
        }
    }

    async function ejecutarIA(news) {
        const resumenDiv = document.getElementById('ai-resumen');
        const estadoIA = document.getElementById('ia-estado');
        
        // Enviamos un lote mayor para un resumen más extenso
        const titulos = news.slice(0, 50).map(n => n.titulo).join(" | ");

        try {
            estadoIA.innerText = "Fase 2: Redactando resumen estratégico";
            
            const resp = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulos })
            });
            const result = await resp.json();
            
            estadoIA.innerText = "Análisis Finalizado";
            resumenDiv.innerHTML = `<strong>Resumen de Medios:</strong><br>${result.resumen}`;
        } catch (err) {
            estadoIA.innerText = "Análisis fallido";
            resumenDiv.innerText = "Hubo un problema al conectar con la Inteligencia Artificial.";
        }
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const grouped = news.reduce((acc, n) => {
            acc[n.fuente] = acc[n.fuente] || [];
            acc[n.fuente].push(n);
            return acc;
        }, {});

        for (const f in grouped) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            const rows = grouped[f].map(n => `<div class="noticia-row"><a href="${n.link}" target="_blank" class="title">${n.titulo}</a></div>`).join('');
            card.innerHTML = `<div class="diario-header">${f}</div><div>${rows}</div>`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    iniciar();
    setInterval(iniciar, 300000); // Actualiza cada 5 minutos para no saturar la IA
</script>
</body>
</html>
