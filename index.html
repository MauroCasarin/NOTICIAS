<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Veredicto IA</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --orange: #f59e0b; --text: #0f172a; --border: #e2e8f0; --ai-bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Bloque Fijo Superior */
        .fixed-top {
            position: sticky; top: 0; background: white; z-index: 1000;
            padding: 10px; border-bottom: 2px solid var(--blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ai-panel { background: var(--ai-bg); border: 1px solid var(--blue); border-radius: 12px; padding: 15px; }
        #ai-resumen { font-size: 0.92rem; line-height: 1.5; color: #334155; font-weight: 500; min-height: 45px; border-left: 3px solid var(--blue); padding-left: 12px; }
        
        .acciones-ia { display: flex; gap: 10px; margin-top: 12px; }
        .btn-ia { 
            border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; 
            font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-analizar { background: var(--blue); color: white; }
        .btn-resumir { background: var(--orange); color: white; }
        .btn-ia:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Contenedor de Noticias con Scroll */
        .scroll-content { flex: 1; overflow-y: auto; padding: 15px; background: #ffffff; }
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; max-width: 1300px; margin: auto; }
        .diario-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: white; height: fit-content; }
        .diario-header { font-size: 0.85rem; font-weight: 800; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        .title { font-size: 0.82rem; font-weight: 600; color: #334155; text-decoration: none; display: block; padding: 6px 0; border-bottom: 1px solid #f8fafc; }
    </style>
</head>
<body>

    <div class="fixed-top">
        <header class="header">
            <div style="display:flex; align-items:center; gap:8px">
                <img src="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico" width="18">
                <span style="font-weight:900; color:var(--blue); font-size:0.75rem;">CENTINELA IA</span>
            </div>
            <span id="contador" style="font-size:0.65rem; font-weight:bold; color:#64748b;">SINCRONIZANDO...</span>
        </header>

        <section class="ai-panel">
            <div id="ai-resumen">Preparando veredicto de medios...</div>
            <div class="acciones-ia">
                <button id="btn-extenso" class="btn-ia btn-analizar" onclick="pedirAnalisis('extenso')" disabled>
                    <i data-lucide="brain-circuit" size="14"></i> ANALIZAR
                </button>
                <button id="btn-corto" class="btn-ia btn-resumir" onclick="pedirAnalisis('resumir')" disabled>
                    <i data-lucide="zap" size="14"></i> RESUMIR
                </button>
            </div>
        </section>
    </div>

    <main class="scroll-content">
        <div id="pizarra" class="grid-noticias"></div>
    </main>

<script>
    const NEWS_API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";
    let ultimaData = [];
    let isTyping = false;

    async function monitorear() {
        try {
            const res = await fetch(NEWS_API);
            const data = await res.json();
            const news = data.noticias || [];
            if (JSON.stringify(news) !== JSON.stringify(ultimaData)) {
                ultimaData = news;
                document.getElementById('contador').innerText = `${news.length} NOTICIAS ANALIZADAS`;
                render(news);
                if (!isTyping) pedirAnalisis('extenso');
            }
        } catch (e) { console.error("Error de carga"); }
    }

    async function pedirAnalisis(modo) {
        if (ultimaData.length === 0 || isTyping) return;
        isTyping = true;
        document.querySelectorAll('.btn-ia').forEach(b => b.disabled = true);
        const resDiv = document.getElementById('ai-resumen');
        resDiv.innerText = modo === 'resumir' ? "Generando síntesis flash..." : "Comparando todos los titulares...";

        try {
            // Enviamos hasta 100 titulares para un análisis real y total
            const titulos = ultimaData.slice(0, 100).map(n => n.titulo).join(" | ");
            const resp = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulos, modo })
            });
            const result = await resp.json();
            typeWriter(result.resumen, "ai-resumen");
        } catch (err) {
            resDiv.innerText = "Error de conexión con la IA";
            isTyping = false;
            document.querySelectorAll('.btn-ia').forEach(b => b.disabled = false);
        }
    }

    function typeWriter(text, elementId) {
        let i = 0;
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 12);
            } else {
                isTyping = false;
                document.querySelectorAll('.btn-ia').forEach(b => b.disabled = false);
            }
        }
        type();
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const grouped = news.reduce((acc, n) => {
            acc[n.fuente] = acc[n.fuente] || [];
            acc[n.fuente].push(n);
            return acc;
        }, {});
        for (const f in grouped) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            const rows = grouped[f].map(n => `<a href="${n.link}" target="_blank" class="title">${n.titulo}</a>`).join('');
            card.innerHTML = `<div class="diario-header">${f}</div>${rows}`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    monitorear();
    setInterval(monitorear, 30000); // Revisa noticias cada 30 segundos
</script>
</body>
</html>
