<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Full Feed</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); }
        .container { max-width: 1200px; margin: auto; }

        /* Header Fijo para control */
        .header { 
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 10px; z-index: 100; border: 1px solid #334155;
        }
        .feed-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--blue); }
        #contador-total { background: var(--blue); color: white; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; }

        /* Grid Multicolumna para PC, una sola para móvil */
        .grid-noticias { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
        }

        .diario-card { 
            background: var(--card-bg); border-radius: 12px; padding: 15px; 
            border: 1px solid #334155; height: fit-content;
        }
        .diario-header { 
            font-size: 0.9rem; font-weight: 800; color: #60a5fa; 
            border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 10px;
            display: flex; justify-content: space-between;
        }

        /* Lista de noticias sin fin */
        .noticia-row { 
            padding: 8px 0; border-bottom: 1px solid #334155; 
            display: flex; gap: 8px; align-items: flex-start;
        }
        .noticia-row:last-child { border-bottom: none; }
        .dot { width: 4px; height: 4px; background: var(--blue); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        
        .title { 
            font-size: 0.82rem; font-weight: 500; line-height: 1.3; 
            color: #cbd5e1; text-decoration: none; display: block; 
        }
        .title:hover { color: white; }

        .update-tag { font-size: 0.6rem; color: #64748b; margin-top: 10px; text-align: center; }
        
        /* Animación de carga */
        #loader { text-align: center; padding: 100px; color: var(--blue); }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="rss" style="width: 16px;"></i>
            <span class="feed-title">Flujo Total de Medios</span>
            <span id="contador-total">0 noticias</span>
        </div>
        <div id="status" style="font-size: 0.6rem; color: #64748b;">Sincronizando...</div>
    </div>

    <div id="loader">
        <div class="spin"><i data-lucide="refresh-cw" size="32"></i></div>
        <p>Procesando más de 15 portales...</p>
    </div>

    <div id="pizarra" class="grid-noticias"></div>
    
    <div class="update-tag">
        Auto-update activo cada 60s • <span id="clock">--:--</span>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";

    async function streamNoticias() {
        try {
            const response = await fetch(API);
            const data = await response.json();
            const news = data.noticias || [];

            document.getElementById('contador-total').innerText = `${news.length} noticias`;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').innerText = "EN VIVO";
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();

            render(news);
        } catch (e) {
            document.getElementById('status').innerText = "ERROR DE CONEXIÓN";
        }
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';

        // Agrupar todas las noticias por fuente
        const grouped = news.reduce((acc, n) => {
            if (!acc[n.fuente]) acc[n.fuente] = [];
            acc[n.fuente].push(n);
            return acc;
        }, {});

        // Crear una tarjeta por cada diario, mostrando TODAS sus noticias
        for (const source in grouped) {
            const card = document.createElement('div');
            card.className = 'diario-card';
            
            const rows = grouped[source].map(n => `
                <div class="noticia-row">
                    <div class="dot"></div>
                    <a href="${n.link}" target="_blank" class="title">${n.titulo}</a>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="diario-header">
                    <span>${source}</span>
                    <span style="font-size: 0.6rem; opacity: 0.6">${grouped[source].length}</span>
                </div>
                ${rows}
            `;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    streamNoticias();
    setInterval(streamNoticias, 60000);
</script>

</body>
</html>
