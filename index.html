<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - IA</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --orange: #f59e0b; --text: #0f172a; --border: #e2e8f0; --ai-bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 10px; color: var(--text); }
        .container { max-width: 1200px; margin: auto; }

        .ai-panel { background: var(--ai-bg); border: 1px solid var(--blue); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(37,99,235,0.1); }
        #ai-resumen { font-size: 1rem; line-height: 1.6; color: #334155; font-weight: 500; min-height: 50px; }
        
        .acciones-ia { display: flex; gap: 10px; margin-top: 15px; }
        .btn-ia { 
            border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; 
            font-size: 0.75rem; font-weight: 800; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-analizar { background: var(--blue); color: white; }
        .btn-resumir { background: var(--orange); color: white; }
        .btn-ia:disabled { opacity: 0.5; cursor: not-allowed; }

        .header { background: #fff; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--blue); margin-bottom: 15px; }
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .diario-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
        .diario-header { font-size: 0.85rem; font-weight: 800; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        .title { font-size: 0.82rem; font-weight: 600; color: #334155; text-decoration: none; display: block; padding: 5px 0; border-bottom: 1px solid #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <section class="ai-panel">
        <div id="ai-resumen">Cargando inteligencia estratégica...</div>
        <div class="acciones-ia">
            <button id="btn-extenso" class="btn-ia btn-analizar" onclick="pedirAnalisis('extenso')" disabled>
                <i data-lucide="brain-circuit"></i> ANALIZAR
            </button>
            <button id="btn-corto" class="btn-ia btn-resumir" onclick="pedirAnalisis('resumir')" disabled>
                <i data-lucide="zap"></i> RESUMIR
            </button>
        </div>
    </section>

    <header class="header">
        <div style="display:flex; align-items:center; gap:8px">
            <img src="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico" width="20">
            <span style="font-weight:900; color:var(--blue); font-size:0.8rem;">CENTINELA</span>
        </div>
        <span id="contador" style="font-size:0.7rem; font-weight:bold; color:#64748b;">CONECTANDO...</span>
    </header>

    <main id="pizarra" class="grid-noticias"></main>
</div>

<script>
    const NEWS_API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";
    let ultimaData = [];
    let isTyping = false;

    async function monitorear() {
        try {
            const res = await fetch(NEWS_API);
            const data = await res.json();
            const news = data.noticias || [];
            if (JSON.stringify(news) !== JSON.stringify(ultimaData)) {
                ultimaData = news;
                document.getElementById('contador').innerText = `${news.length} NOTICIAS VIVAS`;
                render(news);
                if (!isTyping) pedirAnalisis('extenso');
            }
        } catch (e) {}
    }

    async function pedirAnalisis(modo) {
        if (ultimaData.length === 0 || isTyping) return;
        isTyping = true;
        document.querySelectorAll('.btn-ia').forEach(b => b.disabled = true);
        const resDiv = document.getElementById('ai-resumen');
        resDiv.innerText = modo === 'resumir' ? "Sintetizando..." : "Analizando tendencias...";

        try {
            const titulos = ultimaData.slice(0, 50).map(n => n.titulo).join(" | ");
            const resp = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulos, modo })
            });
            const result = await resp.json();
            typeWriter(result.resumen, "ai-resumen");
        } catch (err) {
            resDiv.innerText = "Error en NoticiasAPI";
            isTyping = false;
            document.querySelectorAll('.btn-ia').forEach(b => b.disabled = false);
        }
    }

    function typeWriter(text, elementId) {
        let i = 0;
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 15);
            } else {
                isTyping = false;
                document.querySelectorAll('.btn-ia').forEach(b => b.disabled = false);
            }
        }
        type();
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const grouped = news.reduce((acc, n) => {
            acc[n.fuente] = acc[n.fuente] || [];
            acc[n.fuente].push(n);
            return acc;
        }, {});
        for (const f in grouped) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            const rows = grouped[f].map(n => `<a href="${n.link}" target="_blank" class="title">${n.titulo}</a>`).join('');
            card.innerHTML = `<div class="diario-header">${f}</div>${rows}`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    monitorear();
    setInterval(monitorear, 30000);
</script>
</body>
</html>
