<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - Inteligencia de Medios</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --blue: #2563eb; --text: #1e293b; --border: #e2e8f0; --ai-bg: #f8fafc; --green: #10b981; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #ffffff; margin: 0; padding: 10px; color: var(--text); line-height: 1.5; }
        .container { max-width: 1200px; margin: auto; }

        /* Panel Superior de IA */
        .ai-panel { 
            background: var(--ai-bg); border: 1px solid var(--blue); border-radius: 12px; 
            padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .ai-title { font-size: 0.75rem; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; }
        #ai-resumen { font-size: 0.95rem; color: #334155; font-weight: 500; }

        .header { 
            background: #ffffff; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--blue);
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .favicon-img { width: 20px; height: 20px; }
        
        #alerta-nuevas { background: var(--green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; display: none; animation: slideDown 0.4s ease; }

        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .diario-card { background: #ffffff; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .diario-header { font-size: 1rem; font-weight: 800; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; }

        .noticia-row { padding: 9px 0; border-bottom: 1px solid #f1f5f9; }
        .noticia-row:last-child { border-bottom: none; }
        .title { font-size: 0.88rem; font-weight: 600; color: #334155; text-decoration: none; display: block; transition: color 0.2s; }
        .title:hover { color: var(--blue); }
        
        #loader-main { text-align: center; padding: 60px; color: var(--blue); font-weight: bold; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="ai-panel">
        <div class="ai-header">
            <i data-lucide="sparkles" style="color: var(--blue); width: 16px;"></i>
            <span class="ai-title">Análisis de Tendencias (Groq IA)</span>
        </div>
        <div id="ai-resumen">Analizando los 15 portales para encontrar la noticia del momento...</div>
    </div>

    <header class="header">
        <div class="brand">
            <img src="https://raw.githubusercontent.com/MauroCasarin/NOTICIAS/refs/heads/main/favicon.ico" class="favicon-img" alt="logo">
            <span style="font-size: 0.9rem; font-weight: 800; color: var(--blue);">CENTINELA</span>
        </div>
        <div id="alerta-nuevas"></div>
        <span id="contador-total" style="font-size: 0.7rem; font-weight: bold; color: #64748b;">Sincronizando...</span>
    </header>

    <div id="loader-main">
        <div class="spin"><i data-lucide="refresh-cw" size="32"></i></div>
        <p>Cargando todas las fuentes...</p>
    </div>

    <main id="pizarra" class="grid-noticias"></main>
</div>

<script>
    // CONFIGURACIÓN - PEGA TU API KEY AQUÍ
    const GROQ_API_KEY = "TU_API_KEY_DE_GROQ"; 
    const NEWS_API = "https://script.google.com/macros/s/AKfycbyRzAtQjhLexPaatkpxGCgq6dfLzp7R6-xO0zvComD3gg1CJbODXaZdqUe5GX9zi0lP4A/exec";
    
    let noticiasAnteriores = [];

    async function monitorear() {
        try {
            const response = await fetch(NEWS_API);
            const data = await response.json();
            const news = data.noticias || [];

            if (noticiasAnteriores.length > 0) {
                const linksViejos = new Set(noticiasAnteriores.map(n => n.link));
                const nuevas = news.filter(n => !linksViejos.has(n.link));

                if (nuevas.length > 0) {
                    document.getElementById('alerta-nuevas').innerText = `+${nuevas.length} NOTICIAS NUEVAS`;
                    document.getElementById('alerta-nuevas').style.display = 'block';
                    render(news);
                    analizarConIA(news); // Actualizar resumen si hay noticias nuevas
                    setTimeout(() => document.getElementById('alerta-nuevas').style.display = 'none', 10000);
                }
            } else {
                render(news);
                analizarConIA(news);
            }

            noticiasAnteriores = news;
            document.getElementById('contador-total').innerText = `${news.length} NOTICIAS TOTALES`;
            document.getElementById('loader-main').style.display = 'none';
        } catch (e) {
            console.error("Error cargando noticias");
        }
    }

    async function analizarConIA(news) {
        if (!GROQ_API_KEY || GROQ_API_KEY === "TU_API_KEY_DE_GROQ") return;
        
        const resumenDiv = document.getElementById('ai-resumen');
        // Tomamos los primeros 50 títulos para que la IA tenga contexto amplio
        const contexto = news.slice(0, 50).map(n => n.titulo).join(" | ");

        try {
            const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user",
                        content: `Eres un analista financiero. Basado en estos titulares, resume en UNA SOLA FRASE de máximo 20 palabras cuál es la noticia que más se repite o la tendencia más importante del momento en Argentina: ${contexto}`
                    }]
                })
            });
            const aiData = await resp.json();
            resumenDiv.innerHTML = `<i data-lucide="trending-up" style="width:14px; display:inline; margin-right:5px; color:var(--green)"></i> ${aiData.choices[0].message.content}`;
            lucide.createIcons();
        } catch (err) {
            resumenDiv.innerText = "Resumen temporalmente no disponible.";
        }
    }

    function render(news) {
        const pizarra = document.getElementById('pizarra');
        pizarra.innerHTML = '';
        const grouped = news.reduce((acc, n) => {
            if (!acc[n.fuente]) acc[n.fuente] = [];
            acc[n.fuente].push(n);
            return acc;
        }, {});

        for (const source in grouped) {
            const card = document.createElement('section');
            card.className = 'diario-card';
            const rows = grouped[source].map(n => `
                <article class="noticia-row">
                    <a href="${n.link}" target="_blank" class="title">${n.titulo}</a>
                </article>
            `).join('');

            card.innerHTML = `<div class="diario-header"><span>${source}</span></div><div>${rows}</div>`;
            pizarra.appendChild(card);
        }
        lucide.createIcons();
    }

    monitorear();
    setInterval(monitorear, 60000); // Revisar cada 1 minuto
</script>
</body>
</html>
